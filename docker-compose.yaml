services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: clawd-backend
    restart: unless-stopped
    env_file: .env                    
    environment:
      NODE_ENV:     production
      PORT:         3001
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/chat/health"]
      interval: 15s
      timeout:  5s
      retries:  3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
       
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    container_name: clawd-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT:     3000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: clawd-network